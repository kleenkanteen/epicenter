[[permission]]
identifier = "allow-set-autostart-enabled"
description = "Enables the set_autostart_enabled command without any pre-configured scope."
commands.allow = ["set_autostart_enabled"]

[[permission]]
identifier = "deny-set-autostart-enabled"
description = "Denies the set_autostart_enabled command without any pre-configured scope."
commands.deny = ["set_autostart_enabled"]
