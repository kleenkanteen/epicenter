# Gmail API drift check for apps/local-mail.
#
# apps/local-mail talks to the Gmail REST API through a hand-written fetch client
# (src/gmail-client.ts) and validates only the response fields it reads
# (src/schema.ts). Nothing catches Gmail removing or moving a method or field we
# depend on until a live sync breaks. This job fetches Gmail's Discovery document
# and asserts the methods and field paths we rely on still exist.
#
# It is a network call against a Google endpoint, so it is deliberately NOT part
# of `bun test` and does NOT gate pull requests. It runs weekly (and on demand)
# so drift surfaces as a scheduled failure, not a user-facing sync error.
name: local-mail Gmail drift

on:
  schedule:
    # Mondays 12:00 UTC. Drift is slow-moving; weekly is plenty of lead time.
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  gmail-drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: 'package.json'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Gmail API drift
        working-directory: apps/local-mail
        run: bun run check:gmail-drift
